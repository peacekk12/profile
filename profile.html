<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>나야나</title>
    <link rel="stylesheet" href="profile.css" />
  </head>
  <body>
    <section class="info">
      <div class="info-content">
        <h1>권효정</h1>
        <p>
          안녕하세요! <br />
          백엔드를 깊이 있게 배우고 싶어서 백엔드 파트에 지원했습니다. <br />
          잘 부탁드립니당
        </p>
      </div>

      <div class="info-image">
        <img src="profile.png" alt="" />
      </div>
    </section>

    <section class="hobby">
      <h2>취미</h2>
      <div class="hobby-image">
        <img src="health.png" alt="" />
        <img src="tree.jpg" alt="" />
      </div>
      <div class="hobby-content">
        <p>
          취미는 운동입니다! 유도,복싱,주짓수,요가등등 했었구요 요즘은
          헬스합니다! 3대 300치는게 목표에욤 등산도 좋아해요 북한산 등반할 사람
          구합니다~
        </p>
      </div>
    </section>

    <section class="food">
      <h2>좋아하는 음식</h2>
      <div class="food-image">
        <img src="choc.jpg" alt="" />
        <img src="food.jpg" alt="" />
      </div>
      <div class="food-content">
        <p>
          뭉티기 젤 좋아하구요 두쫀쿠도 사랑합니다 일식이랑 한식 제일 좋아하는
          것 같아용
        </p>
      </div>
    </section>
  </body>
</html>
